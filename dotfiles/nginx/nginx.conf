user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # If you want to forward the real client IP to upstream, you can include:
    # set_real_ip_from 0.0.0.0/0;
    # real_ip_header X-Forwarded-For;

    # Basic HTTP server block
    server {
        listen 8080;
        server_name service.example.com;  # Catch-all for any hostname

        # You can add multiple location blocks if you have multiple services
        location / {
            # Proxy to your "dashboard" container on port 3000
            proxy_pass http://gluetun:8080; 
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
