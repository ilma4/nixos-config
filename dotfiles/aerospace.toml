# Place a copy of this config to ~/.aerospace.toml
# After that, you can edit ~/.aerospace.toml to your liking

# You can use it to add commands that run after AeroSpace startup.
# 'after-startup-command' is run after 'after-login-command'
# Available commands : https://nikitabobko.github.io/AeroSpace/commands
after-startup-command = [
  'exec-and-forget open /Applications/KDE Connect.app',
  'exec-and-forget open /Applications/ActivityWatch.app',
]

# Notify Sketchybar about workspace change
exec-on-workspace-change = [
]

# Start AeroSpace at login
start-at-login = true

# Normalizations. See: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# See: https://nikitabobko.github.io/AeroSpace/guide#layouts
# The 'accordion-padding' specifies the size of accordion padding
# You can set 0 to disable the padding feature
accordion-padding = 30

# Possible values: tiles|accordion
default-root-container-layout = 'tiles'

# Possible values: horizontal|vertical|auto
# 'auto' means: wide monitor (anything wider than high) gets horizontal orientation,
#               tall monitor (anything higher than wide) gets vertical orientation
default-root-container-orientation = 'auto'

# Mouse follows focus when focused monitor changes
# Drop it from your config, if you don't like this behavior
# See https://nikitabobko.github.io/AeroSpace/guide#on-focus-changed-callbacks
# See https://nikitabobko.github.io/AeroSpace/commands#move-mouse
# Fallback value (if you omit the key): on-focused-monitor-changed = []
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# You can effectively turn off macOS "Hide application" (cmd-h) feature by toggling this flag
# Useful if you don't use this macOS feature, but accidentally hit cmd-h or cmd-alt-h key
# Also see: https://nikitabobko.github.io/AeroSpace/goodness#disable-hide-app
automatically-unhide-macos-hidden-apps = true

# Possible values: (qwerty|dvorak)
# See https://nikitabobko.github.io/AeroSpace/guide#key-mapping
[key-mapping]
preset = 'qwerty'

# Gaps between windows (inner-*) and between monitor edges (outer-*).
# Possible values:
# - Constant:     gaps.outer.top = 8
# - Per monitor:  gaps.outer.top = [{ monitor.main = 16 }, { monitor."some-pattern" = 32 }, 24]
#                 In this example, 24 is a default value when there is no match.
#                 Monitor pattern is the same as for 'workspace-to-monitor-force-assignment'.
#                 See: https://nikitabobko.github.io/AeroSpace/guide#assign-workspaces-to-monitors
[gaps]
inner.horizontal = 0
inner.vertical = 0
outer.left = 0
outer.bottom = 0
outer.top = 0
outer.right = 0

[workspace-to-monitor-force-assignment]
11 = 'primary'
12 = 'primary'
13 = 'primary'
14 = 'primary'
15 = 'primary'
16 = 'primary'
17 = 'primary'
18 = 'primary'
19 = 'primary'
10 = 'primary'

21 = 'secondary'
22 = 'secondary'
23 = 'secondary'
24 = 'secondary'
25 = 'secondary'
26 = 'secondary'
27 = 'secondary'
28 = 'secondary'
29 = 'secondary'
20 = 'secondary'

# 'main' binding mode declaration
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# 'main' binding mode must be always presented
# Fallback value (if you omit the key): mode.main.binding = {}
[mode.main.binding]

# All possible keys:
# - Letters.        a, b, c, ..., z
# - Numbers.        0, 1, 2, ..., 9
# - Keypad numbers. keypad0, keypad1, keypad2, ..., keypad9
# - F-keys.         f1, f2, ..., f20
# - Special keys.   minus, equal, period, comma, slash, backslash, quote, semicolon, backtick,
#                   leftSquareBracket, rightSquareBracket, space, enter, esc, backspace, tab
# - Keypad special. keypadClear, keypadDecimalMark, keypadDivide, keypadEnter, keypadEqual,
#                   keypadMinus, keypadMultiply, keypadPlus
# - Arrows.         left, down, up, right

# All possible modifiers: cmd, alt, ctrl, shift

# All possible commands: https://nikitabobko.github.io/AeroSpace/commands

# See: https://nikitabobko.github.io/AeroSpace/commands#exec-and-forget
# You can uncomment the following lines to open up terminal with alt + enter shortcut (like in i3)
alt-cmd-enter = '''exec-and-forget osascript -e '
tell application "iTerm"
  create window with default profile
end tell'
'''
#alt-enter = '''exec-and-forget osascript -e '
#tell application "iTerm2"
#    do script
#    activate
#end tell'
#'''

# See: https://nikitabobko.github.io/AeroSpace/commands#layout
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'

# See: https://nikitabobko.github.io/AeroSpace/commands#focus
alt-h = 'focus left --boundaries all-monitors-outer-frame --boundaries-action wrap-around-all-monitors'
alt-j = 'focus down --boundaries all-monitors-outer-frame --boundaries-action wrap-around-all-monitors'
alt-k = 'focus up --boundaries all-monitors-outer-frame --boundaries-action wrap-around-all-monitors'
alt-l = 'focus right --boundaries all-monitors-outer-frame --boundaries-action wrap-around-all-monitors'

# See: https://nikitabobko.github.io/AeroSpace/commands#move
alt-shift-h = 'move --boundaries all-monitors-outer-frame left'
alt-shift-j = 'move --boundaries all-monitors-outer-frame down'
alt-shift-k = 'move --boundaries all-monitors-outer-frame up'
alt-shift-l = 'move --boundaries all-monitors-outer-frame right'

# See: https://nikitabobko.github.io/AeroSpace/commands#resize
alt-shift-minus = 'resize smart -50'
alt-shift-equal = 'resize smart +50'

# See: https://nikitabobko.github.io/AeroSpace/commands#workspace
alt-1 = 'exec-and-forget aerospace list-monitors --focused --format "%{monitor-id}" | xargs -I {} aerospace workspace {}1'
alt-2 = 'exec-and-forget aerospace list-monitors --focused --format "%{monitor-id}" | xargs -I {} aerospace workspace {}2'
alt-3 = 'exec-and-forget aerospace list-monitors --focused --format "%{monitor-id}" | xargs -I {} aerospace workspace {}3'
alt-4 = 'exec-and-forget aerospace list-monitors --focused --format "%{monitor-id}" | xargs -I {} aerospace workspace {}4'
alt-5 = 'exec-and-forget aerospace list-monitors --focused --format "%{monitor-id}" | xargs -I {} aerospace workspace {}5'
alt-6 = 'exec-and-forget aerospace list-monitors --focused --format "%{monitor-id}" | xargs -I {} aerospace workspace {}6'
alt-7 = 'exec-and-forget aerospace list-monitors --focused --format "%{monitor-id}" | xargs -I {} aerospace workspace {}7'
alt-8 = 'exec-and-forget aerospace list-monitors --focused --format "%{monitor-id}" | xargs -I {} aerospace workspace {}8'
alt-9 = 'exec-and-forget aerospace list-monitors --focused --format "%{monitor-id}" | xargs -I {} aerospace workspace {}9'
alt-0 = 'exec-and-forget aerospace list-monitors --focused --format "%{monitor-id}" | xargs -I {} aerospace workspace {}0'


# See: https://nikitabobko.github.io/AeroSpace/commands#move-node-to-workspace
alt-shift-1 = 'exec-and-forget aerospace list-monitors --focused --format "%{monitor-id}" | xargs -I {} aerospace move-node-to-workspace {}1'
alt-shift-2 = 'exec-and-forget aerospace list-monitors --focused --format "%{monitor-id}" | xargs -I {} aerospace move-node-to-workspace {}2'
alt-shift-3 = 'exec-and-forget aerospace list-monitors --focused --format "%{monitor-id}" | xargs -I {} aerospace move-node-to-workspace {}3'
alt-shift-4 = 'exec-and-forget aerospace list-monitors --focused --format "%{monitor-id}" | xargs -I {} aerospace move-node-to-workspace {}4'
alt-shift-5 = 'exec-and-forget aerospace list-monitors --focused --format "%{monitor-id}" | xargs -I {} aerospace move-node-to-workspace {}5'
alt-shift-6 = 'exec-and-forget aerospace list-monitors --focused --format "%{monitor-id}" | xargs -I {} aerospace move-node-to-workspace {}6'
alt-shift-7 = 'exec-and-forget aerospace list-monitors --focused --format "%{monitor-id}" | xargs -I {} aerospace move-node-to-workspace {}7'
alt-shift-8 = 'exec-and-forget aerospace list-monitors --focused --format "%{monitor-id}" | xargs -I {} aerospace move-node-to-workspace {}8'
alt-shift-9 = 'exec-and-forget aerospace list-monitors --focused --format "%{monitor-id}" | xargs -I {} aerospace move-node-to-workspace {}9'
alt-shift-0 = 'exec-and-forget aerospace list-monitors --focused --format "%{monitor-id}" | xargs -I {} aerospace move-node-to-workspace {}0'


# See: https://nikitabobko.github.io/AeroSpace/commands#workspace-back-and-forth
#alt-tab = 'workspace-back-and-forth'
alt-tab = 'focus-monitor --wrap-around next'
# See: https://nikitabobko.github.io/AeroSpace/commands#move-workspace-to-monitor
# alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# See: https://nikitabobko.github.io/AeroSpace/commands#mode
alt-shift-semicolon = 'mode service'

alt-f = 'fullscreen'


[[on-window-detected]]
if.app-id = 'com.bitwarden.desktop'
run = 'move-node-to-workspace N10'

[[on-window-detected]]
if.app-id = 'org.mozilla.firefox'
if.window-title-regex-substring = 'Extension: \(Bitwarden Password Manager\) - Bitwarden'
run = 'layout floating'

# 'service' binding mode declaration.
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main'] # reset layout
f = [
  'layout floating tiling',
  'mode main',
] # Toggle between floating and tiling layout
backspace = ['close-all-windows-but-current', 'mode main']

# sticky is not yet supported https://github.com/nikitabobko/AeroSpace/issues/2
#s = ['layout sticky tiling', 'mode main']

alt-shift-h = ['join-with left', 'mode main']
alt-shift-j = ['join-with down', 'mode main']
alt-shift-k = ['join-with up', 'mode main']
alt-shift-l = ['join-with right', 'mode main']
