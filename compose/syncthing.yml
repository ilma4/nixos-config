services:
  syncthing:
    image: syncthing/syncthing:latest
    ports:
      - "8384:8384"
      - "22000:22000"
      - "21027:21027/udp"
    volumes:
      - "/srv/syncthing:/var/syncthing"
      - "/etc/localtime:/etc/localtime:ro"
    hostname: ilma4-bkp-syncthing
    network_mode: host
    healthcheck:
      test: ["CMD", "curl", "-fkLsS", "-m", "2", "127.0.0.1:8384/rest/noauth/health"]
      interval: 1m
      retries: 3
      start_period: 20s
      timeout: 10s
    restart: unless-stopped
