name: home-assistant
services:
  home-assistant:
    container_name: home-assistant
    image: "ghcr.io/home-assistant/home-assistant:stable"
    volumes:
      - ${CONFIG_DIR}:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
    expose:
      - "8123"
    networks:
      reverse_proxy:
    restart: unless-stopped
    privileged: true

networks:
  reverse_proxy:
    external: true
