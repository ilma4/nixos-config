---
# Homepage configuration
# See https://fontawesome.com/search for icons options

title: "Demo dashboard"
subtitle: "Homer"
logo: "icons/logo.svg"
# icon: "fas fa-skull-crossbones" # Optional icon

header: true
footer: '<p>Created with <span class="has-text-danger">❤️</span> with <a href="https://bulma.io/">bulma</a>, <a href="https://vuejs.org/">vuejs</a> & <a href="https://fontawesome.com/">font awesome</a> // Fork me on <a href="https://github.com/bastienwirtz/homer"><i class="fab fa-github-alt"></i></a></p>' # set false if you want to hide it.

# Optional theme customization
theme: default

# Optional theme customization (color overrrides)
# overrrides can also be done using CSS vars
colors:
  light:
    highlight-primary: "#3367d6"
    highlight-secondary: "#4285f4"
    highlight-hover: "#5a95f5"
    background: "#f5f5f5"
    card-background: "#ffffff"
    text: "#363636"
    text-header: "#ffffff"
    text-title: "#303030"
    text-subtitle: "#424242"
    card-shadow: rgba(0, 0, 0, 0.1)
    link: "#3273dc"
    link-hover: "#363636"
  dark:
    highlight-primary: "#3367d6"
    highlight-secondary: "#4285f4"
    highlight-hover: "#5a95f5"
    background: "#131313"
    card-background: "#2b2b2b"
    text: "#eaeaea"
    text-header: "#ffffff"
    text-title: "#fafafa"
    text-subtitle: "#f5f5f5"
    card-shadow: rgba(0, 0, 0, 0.4)
    link: "#3273dc"
    link-hover: "#ffdd57"

# # Optional message
# message:
#   #url: https://b4bz.io
#   style: "is-dark" # See https://bulma.io/documentation/components/message/#colors for styling options.
#   title: "Demo !"
#   icon: "fa fa-grin"
#   content: "This is a dummy homepage demo. <br /> Find more information on <a href='https://github.com/bastienwirtz/homer'>github.com/bastienwirtz/homer</a>"

# Optional navbar
# links: [] # Allows for navbar (dark mode, layout, and search) without any links
links:
  - name: "Contribute"
    icon: "fab fa-github"
    url: "https://github.com/bastienwirtz/homer"
    target: "_blank" # optional html a tag target attribute
  - name: "Wiki"
    icon: "fas fa-book"
    url: "https://www.wikipedia.org/"
  # this will link to a second homer page that will load config from additional-page.yml and keep default config values as in config.yml file
  # see url field and assets/additional-page.yml.dist used in this example:
  #- name: "another page!"
  #  icon: "fas fa-file-alt"
  #  url: "#additional-page"

# Services
# First level array represent a group.
# Leave only a "items" key if not using group (group name, icon & tagstyle are optional, section separation will not be displayed).
services:
  - name: "Applications"
    icon: "fas fa-cloud"
    items:
      - name: "Home Assistant"
        icon: "fas fa-home"
        subtitle: "Home automation"
        url: "https://home-assistant.ilma4.local"
      - name: "Actual Budget"
        icon: "fas fa-wallet"
        subtitle: "Personal finance"
        url: "https://actual-budget.ilma4.local"
      - name: "Paperless"
        icon: "fas fa-file-alt"
        subtitle: "Document management"
        url: "https://paperless.ilma4.local"
      - name: "PDF Tools"
        icon: "fas fa-file-pdf"
        subtitle: "Stirling PDF"
        url: "https://pdf-tools.ilma4.local"

  - name: "Media"
    icon: "fas fa-photo-video"
    items:
      - name: "Immich"
        icon: "fas fa-images"
        subtitle: "Photo library"
        url: "https://immich.ilma4.local"
      - name: "Audiobookshelf"
        icon: "fas fa-headphones"
        subtitle: "Audiobooks and podcasts"
        url: "https://audiobookshelf.ilma4.local"
      - name: "qBittorrent"
        icon: "fas fa-download"
        subtitle: "Torrent client"
        url: "https://torrent.ilma4.local"

  - name: "Monitoring"
    icon: "fas fa-chart-line"
    items:
      - name: "Grafana"
        icon: "fas fa-chart-area"
        subtitle: "Metrics dashboard"
        url: "https://grafana.ilma4.local"
      - name: "Prometheus"
        icon: "fas fa-chart-bar"
        subtitle: "Metrics database"
        url: "https://prometheus.ilma4.local"

  - name: "Infrastructure"
    icon: "fas fa-server"
    items:
      - name: "Dashboard"
        icon: "fas fa-columns"
        subtitle: "Homer"
        url: "https://dashboard.ilma4.local"
      - name: "Traefik Error Page"
        icon: "fas fa-exclamation-triangle"
        subtitle: "Catch-all 404 route"
        url: "https://error-page.ilma4.local"
